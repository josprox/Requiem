set default=0
set timeout=5

# Graphics configuration
insmod efi_gop
insmod efi_uga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
terminal_output gfxterm

menuentry "Joss Red Installer (Live RAM Mode - Recommended)" {
    search --set=root --file /live/vmlinuz
    linux /live/vmlinuz boot=live toram
    initrd /live/initrd.img
}

menuentry "Joss Red Installer (Live USB Mode - Low RAM)" {
    search --set=root --file /live/vmlinuz
    linux /live/vmlinuz boot=live
    initrd /live/initrd.img
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
