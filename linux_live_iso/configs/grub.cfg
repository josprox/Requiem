set default=0
set timeout=12

# Keep the boot path conservative. Some UEFI firmware/VMware combinations stop
# showing output right after the EFI stub unless the kernel console is forced.
terminal_input console
terminal_output console
set pager=1

menuentry "Requiem Installer (VMware UEFI - Graphics Enabled)" {
    search --set=root --file /live/filesystem.squashfs
    set gfxpayload=1024x768x32,auto
    linux /live/vmlinuz boot=live components live-media-path=/live username=root hostname=requiem nopersistence noeject rootwait console=tty0 earlyprintk=efi,keep ignore_loglevel debug loglevel=7
    initrd /live/initrd.img
}

menuentry "Requiem Installer (VMware UEFI - No EFI Runtime)" {
    search --set=root --file /live/filesystem.squashfs
    set gfxpayload=1024x768x32,auto
    linux /live/vmlinuz boot=live components live-media-path=/live username=root hostname=requiem nopersistence noeject rootwait console=tty0 earlyprintk=efi,keep ignore_loglevel debug efi=noruntime loglevel=7
    initrd /live/initrd.img
}

menuentry "Requiem Installer (UEFI Safe Console - nomodeset)" {
    search --set=root --file /live/filesystem.squashfs
    set gfxpayload=text
    linux /live/vmlinuz boot=live components live-media-path=/live username=root hostname=requiem nopersistence noeject rootwait console=tty0 earlyprintk=efi,keep ignore_loglevel debug nomodeset i915.modeset=0 nouveau.modeset=0 radeon.modeset=0 amdgpu.modeset=0 loglevel=7
    initrd /live/initrd.img
}

menuentry "Requiem Installer (RAM Mode)" {
    search --set=root --file /live/filesystem.squashfs
    set gfxpayload=text
    linux /live/vmlinuz boot=live components live-media-path=/live username=root hostname=requiem nopersistence noeject rootwait toram console=tty0 earlyprintk=efi,keep ignore_loglevel debug nomodeset i915.modeset=0 nouveau.modeset=0 radeon.modeset=0 amdgpu.modeset=0 loglevel=7
    initrd /live/initrd.img
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
